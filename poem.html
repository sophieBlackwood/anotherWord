<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poem | Midnight Sift</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="index.html">MIDNIGHT <span>SIFT</span></a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="archive.html">Archive</a></li>
            </ul>
        </nav>
    </header>

    <div class="poem-hero">
        <span id="poem-date" class="card-date"></span>
        <h1 id="poem-title" style="font-size: 3rem; margin-top: 1rem;"></h1>
    </div>

    <main class="container">
        <article class="poem-container">
            <div id="poem-content" class="poem-body"></div>
            
            <div style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                <a href="archive.html" style="color: var(--accent); text-decoration: none; font-weight: 600;">← Back to Collection</a>
            </div>
        </article>
    </main>

    <script src="data.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            const poem = poems.find(p => p.id == id);

            if (poem) {
                document.getElementById("poem-title").textContent = poem.title;
                document.getElementById("poem-date").textContent = poem.date;
                document.getElementById("poem-content").innerHTML = poem.content.replace(/\n/g, '<br>');
            }
        });
    </script>
</body>
</html>
