<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poem | Midnight Sift</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="logo.png?v=3"/>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <div class="logo-icon">
                    <span class="line-1"></span>
                    <span class="line-2"></span>
                    <span class="line-3"></span>
                </div>
                <a href="index.html">Midnight <span>Sift</span></a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="archive.html">Archive</a></li>
            </ul>
        </nav>
    </header>

    <div class="poem-hero-visual" id="poem-hero">
        <div class="poem-hero-overlay"></div>
        <div class="poem-hero-content">
            <span id="poem-date" style="color:var(--accent); font-weight:600; text-transform:uppercase; letter-spacing:2px;"></span>
            <h1 id="poem-title" style="font-size: 3.5rem; margin-top: 10px;"></h1>
        </div>
    </div>

    <main class="container">
        <article class="poem-container">
            <div id="poem-content" class="poem-body"></div>
            <div class="poem-footer-nav" style="margin-top: 5rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                <a href="archive.html" style="color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;">← BACK TO ARCHIVE</a>
            </div>
        </article>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 1. RANDOM BACKGROUND LOGIC (Excludes hero.jpg)
        const poemImages = [
            'hero2.jpg', 'hero3.jpg', 'hero4.jpg', 'hero5.jpg', 'hero6.jpg',
            'hero7.jpg', 'hero8.jpg', 'hero9.jpg', 'hero10.jpg', 'hero11.jpg',
            'hero12.jpg', 'hero13.jpg', 'hero14.jpg', 'hero15.jpg', 'hero16.jpg',
            'hero17.jpg', 'hero18.jpg', 'hero19.jpg'
        ];
        
        const hero = document.getElementById('poem-hero');
        if (hero) {
            const randomImg = poemImages[Math.floor(Math.random() * poemImages.length)];
            hero.style.backgroundImage = `url('./${randomImg}')`;
        }

        // 2. POEM LOADING LOGIC
        const params = new URLSearchParams(window.location.search);
        const id = params.get("id");
        
        // Critical: If no ID, stop. Do not redirect to index.html.
        if (!id) {
            console.log("No poem selected.");
            return;
        }

        if (typeof poems !== 'undefined') {
            const poem = poems.find(p => p.id == id);
            if (poem) {
                document.getElementById("poem-title").innerText = poem.title;
                document.getElementById("poem-date").innerText = poem.date;
                document.getElementById("poem-content").innerText = poem.content;
                document.title = `${poem.title} | Midnight Sift`;
            } else {
                document.getElementById("poem-content").innerHTML = 
                    "Poem not found. <a href='./archive.html' style='color:var(--accent)'>Return to Archive</a>";
            }
        }
    });
</script>
</body>
</html>
