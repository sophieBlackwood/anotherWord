<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poem | Midnight Sift</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="index.html">MIDNIGHT <span>SIFT</span></a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="archive.html">Archive</a></li>
            </ul>
        </nav>
    </header>

    <div class="poem-hero-visual">
        <div class="poem-hero-overlay"></div>
        <div class="poem-hero-content">
            <span id="poem-date"></span>
            <h1 id="poem-title"></h1>
        </div>
    </div>

    <main class="container">
        <article class="poem-container">
            <div id="poem-content" class="poem-body"></div>
            <div class="poem-footer-nav">
                <a href="archive.html">← RETURN TO COLLECTION</a>
            </div>
        </article>
    </main>

    <footer>
        MIDNIGHT SIFT &copy; 2026
    </footer>

    <script src="data.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            const poem = poems.find(p => p.id == id);

            if (poem) {
                document.getElementById("poem-title").innerText = poem.title;
                document.getElementById("poem-date").innerText = poem.date;
                document.getElementById("poem-content").innerText = poem.content;
                document.title = `${poem.title} | Midnight Sift`;
            } else {
                window.location.href = "archive.html";
            }
        });
    </script>
</body>
</html>
