<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poem | Midnight Sift</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="index.html">MIDNIGHT <span>SIFT</span></a></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="archive.html">Archive</a></li>
            </ul>
        </nav>
    </header>

    <div class="poem-hero">
        <span id="poem-date" style="color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem;"></span>
        <h1 id="poem-title" style="font-size: 3.5rem; margin-top: 1rem;"></h1>
    </div>

    <main class="container">
        <article class="poem-container">
            <div id="poem-content" class="poem-body">
                </div>
            
            <div style="margin-top: 5rem; padding-top: 2rem; border-top: 1px solid var(--border);">
                <a href="archive.html" style="color: var(--accent); text-decoration: none; font-weight: 600; font-size: 0.9rem;">← RETURN TO COLLECTION</a>
            </div>
        </article>
    </main>

    <footer>
        Midnight Sift &copy; 2026
    </footer>

    <script src="data.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            const poem = poems.find(p => p.id == id);

            if (poem) {
                document.getElementById("poem-title").innerText = poem.title;
                document.getElementById("poem-date").innerText = poem.date;
                // We use innerText to respect line breaks from data.js
                document.getElementById("poem-content").innerText = poem.content;
                document.title = `${poem.title} | Midnight Sift`;
            } else {
                window.location.href = "archive.html";
            }
        });
    </script>
</body>
</html>
