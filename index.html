<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Sift</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="index.html">MIDNIGHT <span>SIFT</span></a></div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="archive.html">Archive</a></li>
            </ul>
        </nav>
    </header>

    <section class="fullscreen-hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>Midnight Sift</h1>
            <p>Before you ever write a poem, you must first survive it.</p>
        </div>
    </section>

    <main class="container">
        <section class="section-label">Featured Works</section>
        <div class="carousel-container">
            <div class="carousel-track" id="featured-list">
                </div>
        </div>

        <section class="about-author-section">
            <div class="about-container">
                <div class="about-image">
                    <img src="profile.jpg" alt="Dallin Stahmann">
                </div>
                <div class="about-text">
                    <span class="section-label" style="text-align: left; margin-bottom: 1rem;">The Author</span>
                    <p id="author-blurb">Dallin is a writer based in Idaho, capturing the raw and genuine through poetry.</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        MIDNIGHT SIFT &copy; 2026
    </footer>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
